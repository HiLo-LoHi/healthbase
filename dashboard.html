<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Health System</title>

    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header class="header">
    <img src="Logo.png" class="logo">
    <div>
        <h1>Barangay Health System</h1>
        <p>Health Center Dashboard</p>
    </div>
</header>
<aside class="sidebar">
    <nav>
        <a href="#" >
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>
        <a href="#">
            <i class="fa-solid fa-users"></i>
            Residents
        </a>
        <a href="#">
            <i class="fa-solid fa-notes-medical"></i>
            Health Logging
        </a>
        <a href="#">
            <i class="fa-solid fa-calendar-check"></i>
            Appointments
        </a>
        <a href="#">
            <i class="fa-solid fa-chart-column"></i>
            Reports
        </a>
        <a href="#">
            <i class="fa-solid fa-gear"></i>
            Settings
        </a>
    </nav>
</aside>

<main class="main">
    <h2>Dashboard</h2>
    <p>Overview of the Barangay Health Center.</p>
    <div class="cards">
        <div class="card">
            <i class="fa-solid fa-users"></i>
            <h3>Total Residents</h3>
            <span>---</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-calendar-check"></i>
            <h3>Appointments</h3>
            <span>---</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-hourglass-half"></i>
            <h3>Pending Requests</h3>
            <span>---</span>
        </div>
        <div class="card">
            <i class="fa-solid fa-syringe"></i>
            <h3>Vaccinations</h3>
            <span>---</span>
        </div>
    </div>
    <div class="box">
        Dashboard content will appear here.
    </div>
</main>
</body>
</html>
