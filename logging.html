<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Health System</title>

    <link rel="stylesheet" href="logging.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<header class="header">
    <img src="Logo.png" class="logo">
    <div>
        <h1>Barangay Health System</h1>
        <p>Health Center Dashboard</p>
    </div>
</header>
<aside class="sidebar">
    <nav>
        <a href="#"><i class="fa-solid fa-house"></i>Dashboard</a>
        <a href="#"><i class="fa-solid fa-users"></i>Residents</a>
        <a href="#"><i class="fa-solid fa-notes-medical"></i>Health Logging</a>
        <a href="#"><i class="fa-solid fa-calendar-check"></i>Appointments</a>
        <a href="#"><i class="fa-solid fa-chart-column"></i>Reports</a>
        <a href="#"><i class="fa-solid fa-gear"></i>Settings</a>
    </nav>
</aside>
<main class="main">
    <h2>Health Logging</h2>
    <p>Add or update patient health record</p>
    <div class="container">
        <section class="panel">
            <div class="panel-header">
                <h3>Patient Information</h3>
            </div>
            <div class="form-grid">
                <div class="field">
                    <label>Resident *</label>
                    <input type="text" placeholder="Search resident name">
                </div>
                <div class="field">
                    <label>Age</label>
                    <input type="number" placeholder="Age">
                </div>
                <div class="field">
                    <label>Sex</label>
                    <select>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <div class="field">
                    <label>Date of Visit *</label>
                    <input type="date">
                </div>
            </div>
            <div class="divider">Vital Signs</div>
            <div class="form-grid">
                <div class="field">
                    <label>Temperature</label>
                    <input type="text" placeholder="°C">
                </div>
                <div class="field">
                    <label>Blood Pressure</label>
                    <input type="text" placeholder="120/80">
                </div>
                <div class="field">
                    <label>Pulse Rate</label>
                    <input type="text" placeholder="bpm">
                </div>
                <div class="field">
                    <label>Respiratory Rate</label>
                    <input type="text" placeholder="breaths/min">
                </div>
            </div>
        </section>
        <section class="panel highlight">
            <div class="panel-header">
                <h3>Medical Assessment</h3>
            </div>
            <div class="form-stack">
                <div class="field">
                    <label>Reason for Visit *</label>
                    <input type="text" placeholder="e.g. fever">
                </div>
                <div class="field">
                    <label>Symptoms</label>
                    <input type="text" placeholder="Describe symptoms">
                </div>
                <div class="field">
                    <label>Diagnosis *</label>
                    <input type="text" placeholder="Diagnosis">
                </div>
                <div class="field">
                    <label>Prescription</label>
                    <input type="text" placeholder="Medications">
                </div>
                <div class="field">
                    <label>Doctor Notes</label>
                    <textarea placeholder="Additional notes"></textarea>
                </div>
            </div>
        </section>
            <div class="button">
            <button>Clear</button>
            <button>Save Record</button>
    </div>
    </div>
</main>
</body>
</html>
