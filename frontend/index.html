<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HealthBase - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <img src="assets/logo.png" alt="HealthBase Logo">

    <div class="sys-name">Barangay Health System</div>
    <div class="sys-tag">Healthier Community, Better Tomorrow</div>

    <div class="form-group" style="text-align:left;">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>


    
    <div class="form-group" style="text-align:left;">
      <label>Password</label>
      
      <div class="password-field">
        <input type="password" id="password" placeholder="Enter password">
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)" aria-label="Show password">
          <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5c5 0 9 5 10 7-1 2-5 7-10 7S3 14 2 12c1-2 5-7 10-7z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; margin-bottom:20px;">
      <label style="display:flex; align-items:center; gap:6px; color:var(--gray);">
        <input type="checkbox" id="rememberMe">
        Remember me
      </label>

      <a href="#" onclick="forgotPassword(event)" style="color:var(--green); text-decoration:none;">
        Forgot password?
      </a>
    </div>

    <button class="btn-primary" style="width:100%; padding:13px;" onclick="login()">
      LOGIN
    </button>

    <div id="loginError" style="color:#e53935; font-size:12px; margin-top:10px;"></div>
    <div id="loginHint" style="color:var(--gray); font-size:11px; margin-top:12px; line-height:1.5;">
      Demo: admin / admin123 or patient / patient123
    </div>
  </div>
</div>

<script src="js/data-store.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
